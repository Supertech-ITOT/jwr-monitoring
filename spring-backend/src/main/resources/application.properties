# APP
spring.application.name=jwr-monitoring

server.address=127.0.0.1
server.port=8080

# SQL JPA
spring.datasource.url=jdbc:postgresql://localhost:5432/jwr-monitoring
spring.datasource.username=postgres
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update

# Log
logging.level.root=INFO
logging.level.com.company.jwr-monitoring=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.org.apache=WARN
logging.level.org.springframework.security=OFF
logging.level.org.springframework.boot.autoconfigure=ERROR
spring.output.ansi.enabled=ALWAYS
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql=OFF
logging.level.com.zaxxer.hikari=INFO
spring.jpa.open-in-view=false
spring.main.banner-mode=off
logging.level.org.apache.plc4x=OFF
logging.level.io.netty=OFF
logging.level.org.apache.plc4x.java.spi.connection=OFF
logging.level.io.netty.channel=OFF
logging.level.io.netty.util=OFF

# Human readable console logs
logging.pattern.console=%d{HH:mm:ss} %msg%n
# Human readable file logs
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{40} - %msg%n

# File logging
logging.file.name=logs/jwr-monitoring.log

# Rotate every 5MB
logging.logback.rollingpolicy.max-file-size=5MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=500MB
logging.logback.rollingpolicy.file-name-pattern=logs/jwr-monitoring-%d{yyyy-MM-dd}.%i.log
